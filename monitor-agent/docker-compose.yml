services:
  monitor-agent:
    build: .
    container_name: coolify-monitor-agent
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=9999
      - AUTH_TOKEN=coolify-monitor-secret-2026
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 30s
      timeout: 5s
      retries: 3
