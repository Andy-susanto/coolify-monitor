services:
  monitor-agent:
    image: alpine:3.19
    container_name: coolify-monitor-agent
    restart: unless-stopped
    expose:
      - "9999"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=9999
    labels:
      - traefik.enable=true
      - traefik.http.routers.monitor-agent.rule=Host(`agent.uinjambi.ac.id`)
      - traefik.http.routers.monitor-agent.entrypoints=http
      - traefik.http.services.monitor-agent.loadbalancer.server.port=9999
    command:
      - sh
      - -c
      - |
        apk add --no-cache docker-cli python3
        printf '%s' '' | base64 -d > /tmp/agent.py
        python3 /tmp/agent.py
