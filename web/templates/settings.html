<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolify Monitor — Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-base: #0f1117; --bg-surface: #1a1d24; --bg-raised: #22262f;
            --bg-input: #161920; --border-subtle: #2a2e38; --border-default: #333842;
            --text-primary: #e8eaed; --text-secondary: #9ca3af; --text-muted: #6b7280;
            --accent: #2dd4bf; --accent-dim: #0d9488; --accent-bg: rgba(45,212,191,0.08);
            --red: #f87171; --red-bg: rgba(248,113,113,0.08);
            --green: #4ade80; --green-bg: rgba(74,222,128,0.08);
            --radius: 8px; --radius-lg: 12px;
        }
        html { font-size: 14px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-base); color: var(--text-primary); min-height: 100vh;
            padding: 32px 16px;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(45,212,191,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(45,212,191,0.02) 0%, transparent 50%);
        }
        .container { width: 100%; max-width: 640px; margin: 0 auto; }
        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; }
        .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
        .back-link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; padding: 8px 14px; border: 1px solid var(--border-subtle); border-radius: var(--radius); transition: all .15s; }
        .back-link:hover { color: var(--text-primary); border-color: var(--border-default); }
        .card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 28px; }
        .card h1 { font-size: 1.3rem; margin-bottom: 6px; }
        .card .sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); }
        .field input[type=text], .field input[type=password], .field input[type=number] {
            width: 100%; padding: 11px 14px; background: var(--bg-input);
            border: 1px solid var(--border-default); border-radius: var(--radius);
            color: var(--text-primary); font-size: 0.95rem; font-family: inherit; transition: border-color .15s;
        }
        .field input:focus { outline: none; border-color: var(--accent); }
        .field .hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 5px; }
        .field .badge-set { font-size: 0.72rem; color: var(--green); background: var(--green-bg); padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .switch { display: flex; align-items: center; gap: 12px; }
        .switch input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn { padding: 11px 20px; border-radius: var(--radius); font-size: 0.92rem; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
        .btn-primary { background: var(--accent); color: #06201c; }
        .btn-primary:hover { background: var(--accent-dim); color: #fff; }
        .btn-ghost { background: transparent; border-color: var(--border-default); color: var(--text-secondary); }
        .btn-ghost:hover { color: var(--text-primary); border-color: var(--accent); }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .toast { margin-top: 18px; padding: 12px 16px; border-radius: var(--radius); font-size: 0.88rem; display: none; }
        .toast.ok { display: block; background: var(--green-bg); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
        .toast.err { display: block; background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
        .loading { color: var(--text-muted); padding: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="brand"><span class="brand-dot"></span> Coolify Monitor</div>
            <a class="back-link" href="/">← Dashboard</a>
        </div>
        <div class="card">
            <h1>Settings</h1>
            <p class="sub">Atur koneksi Coolify, monitor, dan dashboard. Tersimpan otomatis ke konfigurasi.</p>
            <form id="settings-form">
                <div id="fields"><div class="loading">Memuat konfigurasi…</div></div>
                <div class="actions">
                    <button type="submit" class="btn btn-primary" id="save-btn">Simpan</button>
                    <button type="button" class="btn btn-ghost" id="test-btn">Tes Koneksi</button>
                </div>
                <div class="toast" id="toast"></div>
            </form>
        </div>
    </div>

    <script>
        const fieldsEl = document.getElementById('fields');
        const toast = document.getElementById('toast');

        function showToast(msg, ok) {
            toast.textContent = msg;
            toast.className = 'toast ' + (ok ? 'ok' : 'err');
        }

        function renderFields(fields) {
            fieldsEl.innerHTML = '';
            for (const f of fields) {
                const wrap = document.createElement('div');
                wrap.className = 'field';
                if (f.type === 'bool') {
                    const checked = String(f.value).toLowerCase() === 'true';
                    wrap.innerHTML = `
                        <div class="switch">
                            <input type="checkbox" id="${f.key}" ${checked ? 'checked' : ''}>
                            <label for="${f.key}" style="margin:0;cursor:pointer;">${f.label}</label>
                        </div>`;
                } else {
                    const badge = f.is_secret && f.is_set ? '<span class="badge-set">tersimpan</span>' : '';
                    const ph = f.is_secret && f.is_set ? '•••••• (kosongkan = tidak diubah)' : (f.placeholder || '');
                    wrap.innerHTML = `
                        <label for="${f.key}">${f.label}${badge}</label>
                        <input type="${f.type}" id="${f.key}" value="${f.is_secret ? '' : (f.value || '')}" placeholder="${ph}">
                        ${f.is_secret ? '<div class="hint">Dibiarkan kosong berarti nilai lama tetap dipakai.</div>' : ''}`;
                }
                fieldsEl.appendChild(wrap);
            }
            window._fields = fields;
        }

        function collect() {
            const out = {};
            for (const f of window._fields) {
                const el = document.getElementById(f.key);
                if (!el) continue;
                if (f.type === 'bool') out[f.key] = el.checked ? 'true' : 'false';
                else out[f.key] = el.value;
            }
            return out;
        }

        async function load() {
            try {
                const r = await fetch('/api/config');
                const d = await r.json();
                if (!d.ok) throw new Error(d.error || 'gagal memuat');
                renderFields(d.fields);
            } catch (e) {
                fieldsEl.innerHTML = '<div class="loading">Gagal memuat: ' + e.message + '</div>';
            }
        }

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            try {
                const r = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collect()),
                });
                const d = await r.json();
                if (d.ok) { showToast('Tersimpan. Beberapa perubahan (port) butuh restart.', true); load(); }
                else showToast('Gagal: ' + (d.error || 'unknown'), false);
            } catch (e) { showToast('Gagal: ' + e.message, false); }
            btn.disabled = false;
        });

        document.getElementById('test-btn').addEventListener('click', async () => {
            const btn = document.getElementById('test-btn');
            btn.disabled = true;
            showToast('Menyimpan & menguji koneksi…', true);
            try {
                await fetch('/api/config', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collect()),
                });
                const r = await fetch('/api/config/test', { method: 'POST' });
                const d = await r.json();
                if (d.ok) showToast('✓ Koneksi ke Coolify berhasil.', true);
                else showToast('✗ Koneksi gagal: ' + (d.error || 'unknown'), false);
            } catch (e) { showToast('✗ Error: ' + e.message, false); }
            btn.disabled = false;
        });

        load();
    </script>
</body>
</html>
