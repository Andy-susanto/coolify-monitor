<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coolify Monitor — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base:      #0f1117;
            --bg-surface:   #1a1d24;
            --bg-raised:    #22262f;
            --bg-input:     #161920;
            --border-subtle:  #2a2e38;
            --border-default: #333842;
            --text-primary:   #e8eaed;
            --text-secondary: #9ca3af;
            --text-muted:     #6b7280;
            --accent:         #2dd4bf;
            --accent-dim:     #0d9488;
            --accent-bg:      rgba(45, 212, 191, 0.08);
            --red:            #f87171;
            --red-bg:         rgba(248, 113, 113, 0.08);
            --radius:         8px;
            --radius-lg:      12px;
        }

        html { font-size: 14px; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(45, 212, 191, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(45, 212, 191, 0.02) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 16px;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-brand .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            margin-bottom: 12px;
            box-shadow: 0 0 12px rgba(45, 212, 191, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 8px rgba(45, 212, 191, 0.3); }
            50% { box-shadow: 0 0 20px rgba(45, 212, 191, 0.6); }
        }

        .login-brand h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .login-brand h1 span { color: var(--accent); }

        .login-brand p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .error-msg {
            background: var(--red-bg);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--red);
            font-size: 0.85rem;
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            text-align: center;
        }

        .login-form label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-form input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.1);
        }

        .login-form input[type="password"]::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 24px;
            background: var(--accent-dim);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background: var(--accent);
            color: var(--bg-base);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .lock-icon {
            display: inline-block;
            margin-right: 6px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="dot"></div>
                <h1><span>Coolify</span> Monitor</h1>
                <p>UIN Jambi — Dashboard Monitoring</p>
            </div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form class="login-form" method="POST" action="/login">
                <label for="password">
                    <span class="lock-icon">&#128274;</span> Password
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Masukkan password..."
                    autofocus
                    autocomplete="current-password"
                    required
                >
                <button type="submit" class="login-btn">Masuk</button>
            </form>
        </div>
        <div class="login-footer">
            Coolify Monitor v1.0 &middot; UIN Jambi
        </div>
    </div>
</body>
</html>
