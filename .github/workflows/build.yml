name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Tentukan versi & buat tag bila perlu ────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      proceed: ${{ steps.resolve.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve versi & tag
        id: resolve
        run: |
          # Dipicu oleh push tag manual (mis. v1.2.3) → langsung pakai tag itu.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Dipicu oleh tag: $TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push ke main / dispatch → baca versi dari package.json.
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "package.json version: $VERSION -> $TAG"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG sudah ada — lewati build & release."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tag $TAG dibuat & dipush."
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # ─── Build installer Windows (.exe) ──────────────────────────────
  build-windows:
    needs: prepare
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-win.txt

      - name: Build .exe (PyInstaller)
        run: pyinstaller coolify_monitor_win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoolifyMonitor-windows
          path: dist/CoolifyMonitor.exe

  # ─── Build installer macOS (.dmg) ────────────────────────────────
  build-macos:
    needs: prepare
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build .app (py2app)
        run: python setup.py py2app

      - name: Create .dmg
        run: |
          cd dist
          mkdir -p dmg_stage
          cp -R "Coolify Monitor.app" dmg_stage/
          ln -sf /Applications dmg_stage/Applications
          hdiutil create -volname "Coolify Monitor" -srcfolder dmg_stage -ov -format UDZO "Coolify-Monitor.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoolifyMonitor-macos
          path: dist/Coolify-Monitor.dmg

  # ─── Buat GitHub Release & lampirkan installer ───────────────────
  release:
    needs: [prepare, build-windows, build-macos]
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Buat Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
